meta:
  units:
    nominal_capacity: kW
    specific_investment_cost: currency_per_kW
    embedded_emissions: kgCO2e_per_kW
    nominal_efficiency: '-'
    fuel_lhv: kWh_per_unit_fuel
    fuel_emissions: kgCO2e_per_unit_fuel
    capacity_degradation_rate: per_year
    fuel_cost_by_year: currency_per_unit_fuel (list aligned with year labels)
  context:
    formulation: dynamic
    multi_scenario: false
    scenarios:
    - scenario_1
    capacity_expansion: false
    investment_steps: null
    year_labels_for_fuel_cost:
    - '2026'
    - '2027'
    - '2028'
    - '2029'
    - '2030'
    efficiency_curve_path_base: inputs/
  notes:
  - Generator investment-side parameters are scenario-invariant and may vary by investment
    step (cohorts).
  - Generator technical parameters are step-invariant (single block under generator.technical).
  - Generator operation parameters are scenario-dependent and do NOT vary by investment
    step.
  - O&M is expressed as a share of total CAPEX per year.
  - efficiency_curve_csv is optional. If null/empty, constant efficiency equal to
    nominal_efficiency_full_load is assumed.
  - If provided, efficiency_curve_csv should be a path to a CSV file (recommended
    relative to inputs/, e.g. 'generator_efficiency_curve.csv').
  - 'The CSV must contain columns: ''Relative Power Output [-]'' and ''Efficiency
    [-]''.'
  - Relative Power Output [-] should span (at least include) 1, and at 100% the Efficiency
    [-] should match nominal_efficiency_full_load.
  - Degradation is specified as a single annual rate (-/year), scenario-dependent.
  - Fuel cost is provided as a yearly list aligned with year_labels_for_fuel_cost;
    no step-wise fuel cost is supported.
generator:
  label: Generator
  investment:
    by_step:
      base:
        nominal_capacity_kw: 1.0
        lifetime_years: 10
        specific_investment_cost_per_kw: 350
        wacc: 0.05
        embedded_emissions_kgco2e_per_kw: 0.0
  technical:
    nominal_efficiency_full_load: 0.3
    max_installable_capacity_kw: null
  operation:
    by_scenario:
      scenario_1:
        fixed_om_share_per_year: 0.02
        efficiency_curve_csv: null
        capacity_degradation_rate_per_year: 0.0
fuel:
  label: Diesel
  by_scenario:
    scenario_1:
      lhv_kwh_per_unit_fuel: 10
      direct_emissions_kgco2e_per_unit_fuel: 0.0
      by_year_cost_per_unit_fuel:
      - 1.2
      - 1.2
      - 1.2
      - 1.2
      - 1.2
      notes:
      - 'Multi-year formulation: provide one fuel cost value per year label (order
        matters).'
      - If you want constant fuel cost, repeat the same value across the list.
      - Fuel cost varies by year (not by investment step).
      - Ensure unit consistency across LHV, emissions factor, and fuel cost (same
        unit fuel).
