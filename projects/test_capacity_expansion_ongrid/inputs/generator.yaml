meta:
  units:
    generator_nominal_capacity_kw: kW
    generator_lifetime_years: years
    generator_specific_investment_cost_per_kw: currency_per_kW
    generator_wacc: '-'
    generator_embedded_emissions_kgco2e_per_kw: kgCO2e_per_kW
    generator_nominal_efficiency_full_load: '-'
    generator_max_installable_capacity_kw: kW
    generator_fixed_om_share_per_year: share_per_year
    fuel_lhv_kwh_per_unit_fuel: kWh_per_unit_fuel
    fuel_direct_emissions_kgco2e_per_unit_fuel: kgCO2e_per_unit_fuel
    generator_capacity_degradation_rate_per_year: per_year
    fuel_cost_by_year: currency_per_unit_fuel_by_year
  context:
    formulation: dynamic
    multi_scenario: true
    scenarios:
    - Constant_Demand
    - Moderate_Growth
    - High_Growth
    capacity_expansion: true
    investment_steps:
    - step: step_1
      duration_years: 5
    - step: step_2
      duration_years: 5
    - step: step_3
      duration_years: 5
    - step: step_4
      duration_years: 5
    year_labels_for_fuel_cost:
    - '2026'
    - '2027'
    - '2028'
    - '2029'
    - '2030'
    - '2031'
    - '2032'
    - '2033'
    - '2034'
    - '2035'
    - '2036'
    - '2037'
    - '2038'
    - '2039'
    - '2040'
    - '2041'
    - '2042'
    - '2043'
    - '2044'
    - '2045'
    efficiency_curve_path_base: inputs/
  description:
    summary: Generator inputs define cohort-dependent investment data, shared technical
      behavior, scenario-dependent operating assumptions, and scenario fuel properties.
    parameters:
      generator_nominal_capacity_kw: Nominal power represented by one generator unit.
      generator_lifetime_years: Generator lifetime used for replacement and annuity
        calculations.
      generator_specific_investment_cost_per_kw: Specific generator investment cost.
      generator_wacc: Weighted average cost of capital used for generator annuities.
      generator_embedded_emissions_kgco2e_per_kw: Embodied emissions associated with
        generator capacity.
      generator_nominal_efficiency_full_load: Generator efficiency at full load when
        no partial-load curve is used.
      generator_max_installable_capacity_kw: Upper bound on installed generator capacity.
      generator_fixed_om_share_per_year: Fixed annual O&M cost expressed as a share
        of generator CAPEX.
      fuel_lhv_kwh_per_unit_fuel: Lower heating value of the fuel.
      fuel_direct_emissions_kgco2e_per_unit_fuel: Direct combustion emissions per
        unit of fuel.
      fuel_fuel_cost_per_unit_fuel: Fuel price in the steady-state formulation.
      generator_capacity_degradation_rate_per_year: Annual reduction in effective
        generator capacity in the dynamic formulation.
      fuel_cost_by_year: Fuel price trajectory aligned with the dynamic model year
        labels.
