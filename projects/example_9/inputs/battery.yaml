meta:
  units:
    battery_nominal_capacity_kwh: kWh
    battery_specific_investment_cost_per_kwh: currency_per_kWh
    battery_wacc: '-'
    battery_calendar_lifetime_years: years
    battery_embedded_emissions_kgco2e_per_kwh: kgCO2e_per_kWh
    battery_fixed_om_share_per_year: share_per_year
    battery_charge_efficiency: '-'
    battery_discharge_efficiency: '-'
    battery_initial_soc: share
    battery_depth_of_discharge: share
    battery_max_discharge_time_hours: hours
    battery_max_charge_time_hours: hours
    battery_max_installable_capacity_kwh: kWh
    battery_efficiency_curve_csv: csv_path
    battery_end_of_life_soh: share
    battery_cycle_lifetime_to_eol_cycles: cycles
    battery_calendar_fade_curve_csv: csv_path
    battery_calendar_time_increment_per_step: time_increment_per_step
  context:
    formulation: dynamic
    multi_scenario: false
    capacity_expansion: false
    investment_steps: null
  description:
    summary: Battery inputs define step-dependent investment data and shared technical
      parameters.
    parameters:
      battery_nominal_capacity_kwh: Nominal energy capacity represented by one battery
        unit.
      battery_specific_investment_cost_per_kwh: Specific investment cost of battery
        capacity.
      battery_wacc: Weighted average cost of capital used for battery annuities.
      battery_calendar_lifetime_years: Calendar lifetime used for battery replacement
        economics.
      battery_embedded_emissions_kgco2e_per_kwh: Embodied emissions associated with
        battery capacity.
      battery_fixed_om_share_per_year: Fixed annual O&M cost expressed as a share
        of battery CAPEX. In the typical-year formulation this input is scenario-independent.
      battery_charge_efficiency: Battery one-way charging efficiency used directly
        in constant-efficiency mode and as the full-load baseline in curve mode.
      battery_discharge_efficiency: Battery one-way discharging efficiency used directly
        in constant-efficiency mode and as the full-load baseline in curve mode.
      battery_initial_soc: Initial state of charge as a share of usable capacity.
      battery_depth_of_discharge: Usable fraction of nominal battery capacity. When
        cycle fade is enabled, the same value is also used as the reference DoD for
        deriving the internal cycle-fade coefficient from cycle life and end-of-life
        SoH.
      battery_max_discharge_time_hours: Minimum time needed to fully discharge at
        nominal power.
      battery_max_charge_time_hours: Minimum time needed to fully charge at nominal
        power.
      battery_max_installable_capacity_kwh: Optional upper bound on total installed
        battery capacity used as a planning/siting limit. It is not the physics reference
        for the current endogenous degradation model.
      battery_efficiency_curve_csv: 'CSV file containing the battery charge/discharge
        efficiency shape used by the advanced convex loss model. Preferred semantics:
        normalized multipliers relative to the scalar efficiencies above.'
      battery_end_of_life_soh: End-of-life SoH target used to calibrate cycle-fade
        inputs and compare simulated degradation against the economic replacement
        lifetime.
      battery_cycle_lifetime_to_eol_cycles: Cycle life to end of life used together
        with battery_depth_of_discharge and battery_end_of_life_soh to derive the
        internal cycle-fade coefficient automatically.
      battery_calendar_fade_curve_csv: CSV file containing the SoC-dependent calendar-fade
        coefficient curve used by the endogenous degradation surrogate when calendar
        fade is enabled in formulation.json.
      battery_calendar_time_increment_per_step: Exogenous calendar-ageing increment
        applied at each modeled time step when calendar fade is enabled.
battery:
  label: Battery
  investment:
    by_step:
      base:
        nominal_capacity_kwh: 1.0
        specific_investment_cost_per_kwh: 350
        wacc: 0.05
        calendar_lifetime_years: 10
        embedded_emissions_kgco2e_per_kwh: 0.0
        fixed_om_share_per_year: 0.02
  technical:
    charge_efficiency: 0.95
    discharge_efficiency: 0.96
    initial_soc: 0.5
    depth_of_discharge: 0.8
    max_discharge_time_hours: 5.0
    max_charge_time_hours: 5.0
    max_installable_capacity_kwh: 1000000.0
    efficiency_curve_csv: battery_efficiency_curve.csv
    end_of_life_soh: 0.8
    cycle_lifetime_to_eol_cycles: 6000.0
    calendar_fade_curve_csv: battery_calendar_fade_curve.csv
    calendar_time_increment_per_step: 1.0
